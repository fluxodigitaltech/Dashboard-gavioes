# ─────────────────────────────────────────────────────────────────────────────
# Academia Gaviões 24h — Dashboard — nginx config (production)
#
# Replicates Vite's dev proxy (vite.config.ts) so `/evo-api/...` and
# `/evo-integracao/...` continue to work in production.
# ─────────────────────────────────────────────────────────────────────────────

# Use Docker's embedded DNS to resolve the W12 hostnames at runtime so the
# image keeps working even if DNS records change. valid=300s caches results
# for 5 minutes.
resolver 127.0.0.11 valid=300s ipv6=off;

server {
    listen      80;
    server_name _;

    # Static assets root (Vite outputs to /dist, copied into image at /usr/share/nginx/html)
    root        /usr/share/nginx/html;
    index       index.html;

    # Slightly tighter security defaults (mirrors vercel.json)
    add_header  X-Content-Type-Options "nosniff"      always;
    add_header  X-Frame-Options        "DENY"          always;
    add_header  Referrer-Policy        "no-referrer"   always;

    # Tame upload size for the receivables Excel import path
    client_max_body_size 10m;

    # Gzip text assets
    gzip                on;
    gzip_types          text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary           on;
    gzip_min_length     1024;
    gzip_comp_level     6;

    # ─── EVO Integration API proxy ───────────────────────────────────────────
    # Maps /evo-api/<path>  →  https://evo-integracao-api.w12app.com.br/<path>
    # (location regex com capture group; a variável força o resolver a
    #  re-resolver o host em runtime em vez de cachear o IP pra sempre.)
    location ~ ^/evo-api/(.*)$ {
        set $evo_api_upstream "https://evo-integracao-api.w12app.com.br";
        proxy_pass $evo_api_upstream/$1$is_args$args;

        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_set_header    Host                evo-integracao-api.w12app.com.br;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # ─── EVO Integracao (frontend) proxy ────────────────────────────────────
    # Maps /evo-integracao/<path>  →  https://evo-integracao.w12app.com.br/<path>
    location ~ ^/evo-integracao/(.*)$ {
        set $evo_int_upstream "https://evo-integracao.w12app.com.br";
        proxy_pass $evo_int_upstream/$1$is_args$args;

        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_set_header    Host                evo-integracao.w12app.com.br;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;
    }

    # ─── Convites por e-mail (mini-backend Node no MESMO container) ──────────
    # O server/index.mjs ouve em 127.0.0.1:3001. Se ele estiver fora do ar, só
    # os convites param — o resto do dashboard continua servido normalmente.
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_send_timeout     180s;   # pull/backfill de leads pode demorar
        proxy_read_timeout     180s;
    }

    # ─── Static asset caching ────────────────────────────────────────────────
    # Hashed Vite assets in /assets/ are immutable — cache aggressively.
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files  $uri =404;
    }

    # Other static files (favicons, robots.txt etc.)
    location ~* \.(png|jpe?g|gif|svg|webp|ico|woff2?|ttf|eot|otf)$ {
        expires    7d;
        add_header Cache-Control "public, max-age=604800";
        try_files  $uri =404;
    }

    # ─── index.html NUNCA cacheado ───────────────────────────────────────────
    # O index.html referencia os bundles hasheados de /assets. Se ele for
    # cacheado (navegador/CDN), o usuário continua carregando o JS ANTIGO mesmo
    # após um deploy novo ("deployei mas não atualiza"). Força revalidação sempre.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache" always;
        expires    -1;
        try_files  $uri =404;
    }

    # ─── SPA fallback ────────────────────────────────────────────────────────
    # All non-asset requests fall through to index.html so React Router (or
    # the in-app screen state) can handle them.
    location / {
        # Sem cache no HTML do shell (mesma razão do bloco acima) — o try_files
        # cai no /index.html e o navegador sempre revalida.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires    -1;
        try_files $uri $uri/ /index.html;
    }

    # Keep nginx logs concise on healthcheck noise
    location = / {
        access_log off;
        try_files $uri /index.html;
    }
}
